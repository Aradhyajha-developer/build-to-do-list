<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Todo List</h1>

        <form id="todo-form">
            <input
                type="text"
                id="todo-input"
                placeholder="Enter a new task..."
                required
            >

            <button type="submit">
                Add Task
            </button>
        </form>
        <div class="filters">

    <button type="button" id="all-btn">All</button>

    <button type="button" id="active-btn">Active</button>

    <button type="button" id="completed-btn">Completed</button>

</div>

<p id="task-count">0 Tasks Left</p>

        <ul id="todo-list">

        </ul>
    </div>

    <!-- JavaScript File -->
    <script src="script.js"></script>

</body>
</html>
